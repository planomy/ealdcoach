<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="pragma" content="no-cache" />
<meta http-equiv="expires" content="0" />
<title>EALD Coach</title>
<style>
  :root {
    --bg-0: #07091a;
    --bg-1: #0d1230;
    --bg-2: #131a44;
    --panel: rgba(255,255,255,0.06);
    --panel-2: rgba(255,255,255,0.10);
    --border: rgba(255,255,255,0.14);
    --text: #eaf0ff;
    --muted: #9aa8d6;
    --accent: #21e6c1;
    --accent-2: #5cb8ff;
    --warn: #ffb020;
    --bad: #ff5a7a;
    --good: #4ade80;
    --gold: #ffd166;
    --silver: #d6dde9;
    --bronze: #d08359;
    --narr: #ffb86b;
    --pers: #ff77b7;
    --info: #6be3ff;
    --shadow: 0 10px 30px rgba(0,0,0,0.45);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background:
      radial-gradient(1200px 800px at 10% -10%, #1a2370 0%, transparent 60%),
      radial-gradient(1000px 700px at 110% 10%, #4b1d7a 0%, transparent 55%),
      radial-gradient(900px 700px at 50% 120%, #003f5c 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 60%, var(--bg-2));
    background-attachment: fixed;
    overflow-x: hidden;
  }
  body::before {
    /* starfield */
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 20px 30px, #ffffffaa, transparent),
      radial-gradient(1.5px 1.5px at 200px 120px, #ffffff80, transparent),
      radial-gradient(2px 2px at 400px 60px, #ffffff90, transparent),
      radial-gradient(1.5px 1.5px at 600px 200px, #ffffff70, transparent),
      radial-gradient(2px 2px at 800px 100px, #ffffffa0, transparent),
      radial-gradient(1.5px 1.5px at 120px 300px, #ffffff60, transparent),
      radial-gradient(1.5px 1.5px at 700px 350px, #ffffff90, transparent),
      radial-gradient(2px 2px at 1000px 250px, #ffffff80, transparent),
      radial-gradient(1.5px 1.5px at 300px 450px, #ffffff80, transparent),
      radial-gradient(1.5px 1.5px at 900px 500px, #ffffff70, transparent);
    background-size: 1100px 600px;
    background-repeat: repeat;
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 20px 18px 80px; }

  /* Header */
  .topbar {
    display: flex; align-items: center; gap: 14px; padding: 10px 14px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    backdrop-filter: blur(8px);
    box-shadow: var(--shadow);
  }
  .brand {
    display: flex; align-items: center; gap: 10px; font-weight: 800; letter-spacing: 0.5px;
    font-size: 18px;
  }
  .brand .logo {
    width: 34px; height: 34px; border-radius: 10px;
    background: conic-gradient(from 210deg, #21e6c1, #5cb8ff, #ff77b7, #ffd166, #21e6c1);
    display: grid; place-items: center; color: #0b0f2a; font-weight: 900; font-size: 18px;
    box-shadow: 0 0 24px rgba(33,230,193,0.45);
  }
  .topbar .spacer { flex: 1; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--border);
    font-size: 13px; color: var(--text);
  }
  .chip strong { color: #fff; }
  .chip .pts { color: var(--gold); font-weight: 800; }
  .chip .lvl { color: var(--accent); font-weight: 800; }
  .chip .name { color: var(--accent-2); font-weight: 700; max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
    padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 700;
    transition: transform .08s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
    font-size: 14px;
    user-select: none;
  }
  .btn:hover { background: rgba(255,255,255,0.14); }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #04121d; border-color: transparent; box-shadow: 0 8px 20px rgba(33,230,193,0.35);
  }
  .btn.primary:hover { filter: brightness(1.06); }
  .btn.ghost { background: transparent; }
  .btn.danger { background: linear-gradient(135deg, #ff5a7a, #ff8a3d); color: #1a0b0b; }
  .btn.warn { background: linear-gradient(135deg, #ffd166, #ffb020); color: #2b1d04; }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
  .btn.lg { padding: 14px 22px; font-size: 16px; border-radius: 14px; }

  /* Panels */
  .panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 18px;
    padding: 20px; box-shadow: var(--shadow); backdrop-filter: blur(8px);
  }

  /* Hero */
  .hero { margin-top: 18px; display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; }
  @media (max-width: 760px) { .hero { grid-template-columns: 1fr; } }
  .hero h1 {
    margin: 0 0 8px; font-size: clamp(28px, 4vw, 40px); line-height: 1.05;
    background: linear-gradient(120deg, #fff, #b7d8ff 60%, #b7ffe6);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    letter-spacing: 0.2px;
  }
  .hero p { color: var(--muted); margin: 0 0 16px; font-size: 15px; line-height: 1.5; }

  /* Level selector */
  .level-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .level-card {
    flex: 1 1 0; min-width: 130px;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
    border-radius: 14px; padding: 14px; cursor: pointer; text-align: left;
    transition: transform .12s ease, border-color .15s ease, background .15s ease;
  }
  .level-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.3); }
  .level-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(33,230,193,0.25), 0 8px 22px rgba(33,230,193,0.15); }
  .level-card .l-num { font-size: 26px; font-weight: 900; }
  .level-card .l-title { font-weight: 700; }
  .level-card .l-sub { color: var(--muted); font-size: 12px; margin-top: 4px; }

  /* Unit grid */
  .units {
    display: grid; gap: 14px; margin-top: 18px;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  }
  .unit {
    position: relative;
    border: 1px solid var(--border); background: var(--panel-2);
    border-radius: 16px; padding: 16px; cursor: pointer;
    transition: transform .12s ease, border-color .15s ease, box-shadow .15s ease, background .15s ease;
    overflow: hidden;
  }
  .unit:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.28); box-shadow: 0 12px 30px rgba(0,0,0,0.35); }
  .unit .emoji { font-size: 38px; line-height: 1; }
  .unit .uname { margin-top: 8px; font-weight: 800; font-size: 16px; }
  .unit .stars { margin-top: 10px; display: flex; gap: 4px; font-size: 14px; color: #4a5290; }
  .unit .stars .on { color: var(--gold); text-shadow: 0 0 10px rgba(255,209,102,0.7); }
  .unit .corner { position: absolute; top: 10px; right: 10px; font-size: 11px; color: var(--muted); }
  .unit.done { background: linear-gradient(160deg, rgba(33,230,193,0.18), rgba(92,184,255,0.08)); border-color: rgba(33,230,193,0.5); }
  .unit .progress {
    margin-top: 10px; height: 6px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden;
  }
  .unit .progress > div {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2));
    width: 0%; transition: width .4s ease;
  }

  /* Name screen */
  .center-screen {
    min-height: 70vh; display: grid; place-items: center;
  }
  .name-card {
    width: 100%; max-width: 520px;
    text-align: center;
  }
  .name-card h2 { margin: 0 0 6px; font-size: 28px; }
  .name-card p { color: var(--muted); margin: 0 0 16px; }
  .name-card input {
    width: 100%; padding: 14px 16px; font-size: 18px; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px;
    outline: none; text-align: center;
  }
  .name-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(33,230,193,0.2); }

  /* Quiz */
  .quiz-header { display: flex; gap: 12px; align-items: center; margin-top: 8px; }
  .quiz-header .crumb { color: var(--muted); font-size: 13px; }
  .quiz-title { display: flex; align-items: center; gap: 12px; }
  .quiz-title .e { font-size: 36px; }
  .quiz-title h2 { margin: 0; font-size: 24px; }

  .progress-bar { height: 10px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; margin-top: 14px; }
  .progress-bar > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); width: 0%; transition: width .3s ease; }

  .sentences { display: grid; gap: 12px; margin-top: 16px; }
  .qcard {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px; transition: border-color .15s ease, background .15s ease;
  }
  .qcard.correct { border-color: rgba(74,222,128,0.6); background: linear-gradient(160deg, rgba(74,222,128,0.10), transparent 70%); }
  .qcard.wrong { border-color: rgba(255,90,122,0.6); background: linear-gradient(160deg, rgba(255,90,122,0.10), transparent 70%); }
  .qcard.locked input { opacity: 0.7; }

  .qhead { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  .tag {
    font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .tag.narr { background: rgba(255,184,107,0.18); color: var(--narr); border: 1px solid rgba(255,184,107,0.35); }
  .tag.pers { background: rgba(255,119,183,0.18); color: var(--pers); border: 1px solid rgba(255,119,183,0.35); }
  .tag.info { background: rgba(107,227,255,0.18); color: var(--info); border: 1px solid rgba(107,227,255,0.35); }

  .qnum { color: var(--muted); font-size: 12px; font-weight: 700; }
  .zh {
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", -apple-system, sans-serif;
    font-size: 22px; line-height: 1.4; margin: 4px 0 10px;
    color: #ffffff;
  }
  .qcard input[type="text"] {
    width: 100%; padding: 12px 14px; font-size: 16px; color: var(--text);
    background: rgba(0,0,0,0.25); border: 1px solid var(--border); border-radius: 10px; outline: none;
    font-family: inherit;
  }
  .qcard input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(33,230,193,0.18); }
  .feedback {
    margin-top: 8px; font-size: 13px; display: none;
  }
  .qcard.correct .feedback,
  .qcard.wrong .feedback { display: block; }
  .feedback .ok { color: var(--good); font-weight: 800; }
  .feedback .no { color: var(--bad); font-weight: 800; }
  .feedback .expect { color: var(--muted); }
  .feedback .expect b { color: #fff; }

  .quiz-actions {
    position: sticky; bottom: 14px; margin-top: 16px;
    display: flex; gap: 10px; justify-content: space-between; align-items: center;
    background: rgba(7,9,26,0.7); backdrop-filter: blur(8px); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 12px;
  }
  .quiz-actions .info { color: var(--muted); font-size: 13px; }

  /* Results / celebration */
  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    background: rgba(13,18,48,0.95); border: 1px solid var(--border); padding: 12px 16px;
    border-radius: 14px; color: var(--text); display: flex; gap: 10px; align-items: center;
    box-shadow: var(--shadow); z-index: 50; opacity: 0; pointer-events: none;
    transition: opacity .25s ease, transform .25s ease;
  }
  .toast.show { opacity: 1; transform: translate(-50%, -6px); pointer-events: auto; }
  .toast .em { font-size: 22px; }

  /* Modal */
  .modal-back {
    position: fixed; inset: 0; background: rgba(2,4,16,0.75); display: none;
    align-items: center; justify-content: center; z-index: 100; padding: 18px;
    backdrop-filter: blur(6px);
  }
  .modal-back.show { display: flex; }
  .modal {
    width: 100%; max-width: 520px; background: linear-gradient(160deg, #1a2470, #0e1338);
    border: 1px solid var(--border); border-radius: 20px; padding: 24px; text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    animation: pop .25s ease;
  }
  @keyframes pop { from { transform: scale(.9); opacity: 0;} to { transform: scale(1); opacity: 1;} }
  .modal h2 { margin: 0 0 6px; font-size: 28px; }
  .modal p { color: var(--muted); margin: 0 0 14px; }
  .badges-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 10px 0; }
  .badge {
    width: 64px; height: 64px; border-radius: 50%; display: grid; place-items: center;
    background: radial-gradient(circle at 30% 25%, #fff5, transparent 50%), linear-gradient(135deg, #6b7280, #374151);
    font-size: 28px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    border: 2px solid rgba(255,255,255,0.18);
  }
  .badge.bronze { background: radial-gradient(circle at 30% 25%, #fff7, transparent 55%), linear-gradient(135deg, #d08359, #8a4b2a); }
  .badge.silver { background: radial-gradient(circle at 30% 25%, #fff8, transparent 55%), linear-gradient(135deg, #e2e8f0, #94a3b8); }
  .badge.gold   { background: radial-gradient(circle at 30% 25%, #fff8, transparent 55%), linear-gradient(135deg, #ffd166, #b8862a); }
  .badge.star   { background: radial-gradient(circle at 30% 25%, #fff8, transparent 55%), linear-gradient(135deg, #ff77b7, #6b1f8a); }
  .badge.master { background: radial-gradient(circle at 30% 25%, #fff8, transparent 55%), conic-gradient(from 0deg, #21e6c1, #5cb8ff, #ff77b7, #ffd166, #21e6c1); }

  .confetti { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 99; }
  .confetti i {
    position: absolute; top: -10px; width: 8px; height: 14px; border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0.9; }
  }

  /* Achievements drawer */
  .stat-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .stat {
    flex: 1 1 130px; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 12px;
  }
  .stat .k { font-size: 12px; color: var(--muted); }
  .stat .v { font-weight: 800; font-size: 18px; }

  .section-title { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin: 18px 0 8px; }

  .footer-note { color: var(--muted); font-size: 12px; text-align: center; margin-top: 24px; }

  .row-wrap { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .pill {
    background: rgba(255,255,255,0.06); border: 1px solid var(--border); padding: 6px 10px;
    border-radius: 999px; font-size: 12px; color: var(--muted);
  }

  .link {
    background: none; border: none; color: var(--accent-2); cursor: pointer; font-weight: 700; padding: 0;
  }
  .link:hover { text-decoration: underline; }

  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  .shake { animation: shake .25s ease 1; }

  @keyframes glow { 0%,100% { box-shadow: 0 0 0 rgba(74,222,128,0); } 50% { box-shadow: 0 0 24px rgba(74,222,128,0.35); } }
  .glow { animation: glow 1s ease 1; }

  /* Mode tabs */
  .mode-tabs {
    display: inline-flex; gap: 4px; padding: 4px; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 14px; margin-bottom: 14px;
  }
  .mode-tab {
    border: none; background: transparent; color: var(--muted); padding: 8px 14px;
    border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .mode-tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #04121d; box-shadow: 0 4px 14px rgba(33,230,193,0.3);
  }
  .mode-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.06); }

  /* Scramble */
  .scramble-stage { display: flex; flex-direction: column; gap: 12px; }
  .scramble-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .dots { display: flex; gap: 6px; }
  .dots .d {
    width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.12);
  }
  .dots .d.done { background: var(--good); box-shadow: 0 0 8px rgba(74,222,128,0.5); }
  .dots .d.wrong { background: var(--bad); box-shadow: 0 0 8px rgba(255,90,122,0.5); }
  .dots .d.current { background: var(--accent); box-shadow: 0 0 10px rgba(33,230,193,0.6); }

  .slots {
    min-height: 70px; padding: 14px; border-radius: 14px;
    background: rgba(0,0,0,0.22); border: 2px dashed rgba(255,255,255,0.18);
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    position: relative;
  }
  .slots.empty::after {
    content: 'Tap the word tiles below to build your sentence…';
    color: var(--muted); font-size: 14px; font-style: italic;
  }
  .slots.correct { border-color: rgba(74,222,128,0.6); background: linear-gradient(160deg, rgba(74,222,128,0.12), transparent 70%); }
  .slots.wrong { border-color: rgba(255,90,122,0.6); background: linear-gradient(160deg, rgba(255,90,122,0.12), transparent 70%); }

  .bank {
    padding: 14px; border-radius: 14px; background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    min-height: 60px;
  }
  .tile {
    display: inline-flex; align-items: center; padding: 10px 14px; border-radius: 10px;
    background: linear-gradient(180deg, #2a3170, #1a2050); border: 1px solid rgba(255,255,255,0.18);
    color: #fff; font-weight: 700; cursor: pointer; font-size: 16px; user-select: none;
    transition: transform .1s ease, background .15s ease, opacity .15s ease;
    font-family: inherit;
  }
  .tile:hover { transform: translateY(-1px); background: linear-gradient(180deg, #394199, #232c70); }
  .tile:active { transform: translateY(1px); }
  .tile.hint { background: linear-gradient(180deg, #b8862a, #8a6018); box-shadow: 0 0 16px rgba(255,209,102,0.5); }
  .tile.placed-ghost { opacity: 0.25; pointer-events: none; }
  .tile.in-slot { background: linear-gradient(180deg, #2c8b6f, #186650); }
  .tile.in-slot:hover { background: linear-gradient(180deg, #36a585, #1f7a60); }

  .scramble-actions {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: space-between; align-items: center;
    background: rgba(7,9,26,0.7); backdrop-filter: blur(8px); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 12px; position: sticky; bottom: 14px;
  }
  .scramble-feedback {
    margin-top: 4px; padding: 10px 12px; border-radius: 10px; font-size: 14px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border); display: none;
  }
  .scramble-feedback.show { display: block; }
  .scramble-feedback .ok { color: var(--good); font-weight: 800; }
  .scramble-feedback .no { color: var(--bad); font-weight: 800; }
  .scramble-feedback .expect { color: var(--muted); margin-top: 4px; }
  .scramble-feedback .expect b { color: #fff; }

  /* Story Studio */
  .writer textarea {
    width: 100%; min-height: 220px; padding: 14px 16px; font-size: 16px;
    color: var(--text); background: rgba(0,0,0,0.25);
    border: 1px solid var(--border); border-radius: 12px; outline: none;
    font-family: inherit; line-height: 1.55; resize: vertical;
  }
  .writer textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(33,230,193,0.18); }
  .prompt-card {
    padding: 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 14px; margin-bottom: 12px;
  }
  .prompt-card .scen { font-size: 16px; line-height: 1.5; margin: 6px 0 10px; }
  .kw-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 0; }
  .kw {
    background: rgba(33,230,193,0.12); color: var(--accent);
    border: 1px solid rgba(33,230,193,0.35); border-radius: 999px;
    padding: 4px 10px; font-size: 13px; font-weight: 700;
  }
  .kw.used { background: rgba(74,222,128,0.18); color: var(--good); border-color: rgba(74,222,128,0.45); }
  .target {
    color: var(--muted); font-size: 13px; margin-top: 8px;
  }
  .counters { color: var(--muted); font-size: 13px; margin-top: 6px; display: flex; gap: 14px; flex-wrap: wrap; }
  .counters b { color: var(--text); }
  .counters .ok { color: var(--good); }
  .counters .lo { color: var(--warn); }

/* --------------------- HELPERS --------------------- */
function $(sel, root = document) { return root.querySelector(sel); }
function $$(sel, root = document) { return Array.from(root.querySelectorAll(sel)); }
function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'class') e.className = v;
    else if (k === 'style') Object.assign(e.style, v);
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') e.innerHTML = v;
    else if (v !== undefined && v !== null) e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* --------------------- MATCHING --------------------- */
function normalize(s) {
  return (s || '')
    .toLowerCase()
    .replace(/[\u2018\u2019\u201C\u201D]/g, "'")
    .replace(/[.,!?;:"'`~()\[\]{}<>\u3002\uFF0C\uFF01\uFF1F\u2014\u2013-]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}
function levenshtein(a, b) {
  if (a === b) return 0;
  const m = a.length, n = b.length;
  if (!m) return n;
  if (!n) return m;
  let prev = new Array(n + 1);
  let curr = new Array(n + 1);
  for (let j = 0; j <= n; j++) prev[j] = j;
  for (let i = 1; i <= m; i++) {
    curr[0] = i;
    for (let j = 1; j <= n; j++) {
      const cost = a.charCodeAt(i - 1) === b.charCodeAt(j - 1) ? 0 : 1;
      curr[j] = Math.min(prev[j] + 1, curr[j - 1] + 1, prev[j - 1] + cost);
    }
    [prev, curr] = [curr, prev];
  }
  return prev[n];
}
function charSimilarity(a, b) {
  const A = normalize(a), B = normalize(b);
  if (!A && !B) return 1;
  const maxLen = Math.max(A.length, B.length);
  if (!maxLen) return 1;
  return 1 - levenshtein(A, B) / maxLen;
}
function tokenSimilarity(a, b) {
  const A = normalize(a).split(' ').filter(Boolean);
  const B = normalize(b).split(' ').filter(Boolean);
  if (!A.length && !B.length) return 1;
  if (!A.length || !B.length) return 0;
  const setA = new Set(A);
  const setB = new Set(B);
  let inter = 0;
  for (const w of setA) if (setB.has(w)) inter++;
  const union = setA.size + setB.size - inter;
  return inter / union;
}
function isCloseEnough(student, expected) {
  const s = (student || '').trim();
  if (!s) return false;
  const cs = charSimilarity(s, expected);
  const ts = tokenSimilarity(s, expected);
  // forgiving for kids: pass if either is high, or both are decent
  if (cs >= 0.85) return true;
  if (ts >= 0.80) return true;
  if (cs >= 0.78 && ts >= 0.70) return true;
  return false;
}

function modeKey(mode = state.mode) {
  if (mode === 'scramble') return '_SCR';
  if (mode === 'story') return '_STORY';
  return '';
}
function unitDoneKey(unitId, lvl, mode = state.mode) { return `${unitId}_L${lvl}${modeKey(mode)}`; }
function isUnitDone(unitId, lvl, mode = state.mode) { return !!state.completed[unitDoneKey(unitId, lvl, mode)]; }
function countDoneInMode(mode = state.mode) {
  const suffix = modeKey(mode);
  return Object.keys(state.completed).filter(k => {
    if (suffix === '') return !k.endsWith('_SCR') && !k.endsWith('_STORY');
    return k.endsWith(suffix);
  }).length;
}

function awardBadge(id) {
  if (!state.badges.includes(id)) {
    state.badges.push(id);
    saveState();
    toast(`${BADGES[id].icon} New badge: ${BADGES[id].name}!`);
    return true;
  }
  return false;
}
function checkLevelBadges() {
  // Translate mode badges
  for (const lvl of [1, 2, 3]) {
    const all = UNITS.every(u => state.completed[`${u.id}_L${lvl}`]);
    if (all) {
      if (lvl === 1) awardBadge('bronze');
      if (lvl === 2) awardBadge('silver');
      if (lvl === 3) awardBadge('gold');
    }
  }
  const allLevels = UNITS.every(u => state.completed[`${u.id}_L1`] && state.completed[`${u.id}_L2`] && state.completed[`${u.id}_L3`]);
  if (allLevels) awardBadge('master');
  // Scramble mode badges
  for (const lvl of [1, 2, 3]) {
    const all = UNITS.every(u => state.completed[`${u.id}_L${lvl}_SCR`]);
    if (all) {
      if (lvl === 1) awardBadge('scrBronze');
      if (lvl === 2) awardBadge('scrSilver');
      if (lvl === 3) awardBadge('scrGold');
    }
  }
  // Story mode badges
  for (const lvl of [1, 2, 3]) {
    const all = UNITS.every(u => state.completed[`${u.id}_L${lvl}_STORY`]);
    if (all) {
      if (lvl === 1) awardBadge('stBronze');
      if (lvl === 2) awardBadge('stSilver');
      if (lvl === 3) awardBadge('stGold');
    }
  }
  if (state.streak >= 5) awardBadge('streak5');
}

/* --------------------- TOAST / MODAL --------------------- */
let toastTimer;
function toast(text, emoji = '⭐') {
  const t = $('#toast');
  $('#toastText').textContent = text;
  t.querySelector('.em').textContent = emoji;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
function openModal(htmlContent, onClose) {
  const back = $('#modalBack');
  const modal = $('#modal');
  modal.innerHTML = '';
  if (typeof htmlContent === 'string') modal.innerHTML = htmlContent;
  else modal.appendChild(htmlContent);
  back.classList.add('show');
  back.onclick = (e) => {
    if (e.target === back) closeModal(onClose);
  };
}
function closeModal(cb) {
  $('#modalBack').classList.remove('show');
  if (cb) cb();
}

/* --------------------- CONFETTI --------------------- */
function confetti(durationMs = 2200, count = 80) {
  const wrap = $('#confetti');
  const colors = ['#21e6c1', '#5cb8ff', '#ff77b7', '#ffd166', '#ffb86b', '#6be3ff', '#4ade80'];
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('i');
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (1.6 + Math.random() * 1.5) + 's';
    piece.style.animationDelay = (Math.random() * 0.3) + 's';
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    wrap.appendChild(piece);
    setTimeout(() => piece.remove(), durationMs + 500);
  }
}

    'Tip: small spelling slips are okay — get the meaning close and you will pass. ',
    el('span', { style: { opacity: 0.6 } }, APP_VERSION)));
}

function stat(k, v) {
  return el('div', { class: 'stat' },
    el('div', { class: 'k' }, k),
    el('div', { class: 'v' }, String(v))
  );
}

/* --------------------- QUIZ --------------------- */
let quiz = null;

function startQuiz(unitId) {
  const u = UNITS.find(x => x.id === unitId);
  const lvl = state.selectedLevel;
  const data = u.levels[lvl];

  const items = [];
  ['narrative', 'persuasive', 'informative'].forEach(t => {
    data[t].forEach(s => items.push({ type: t, zh: s.zh, en: s.en, answer: '', checked: false, correct: false }));
  });

  quiz = {
    unit: u, level: lvl,
    items,
    firstCheck: true,
    attempts: 0,
    correctOnFirstTry: 0,
    revealedAll: false
  };
  renderQuiz();
}

function renderQuiz() {
  const app = $('#app');
  app.innerHTML = '';
  app.appendChild(topbar());

  const head = el('div', { class: 'panel' });
  const headTop = el('div', { class: 'quiz-header' },
    el('button', { class: 'btn ghost', onclick: () => { if (confirm('Leave this topic? Your progress on this round will be lost.')) { quiz = null; render(); } } }, '← Topics'),
    el('div', { class: 'crumb' }, `Level ${quiz.level} • ${quiz.unit.name}`)
  );
  head.appendChild(headTop);

  head.appendChild(el('div', { class: 'quiz-title' },
    el('div', { class: 'e' }, quiz.unit.emoji),
    el('h2', {}, `${quiz.unit.name} — Translate to English`),
  ));
  head.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '14px', marginTop: '6px' } },
    'Read each Mandarin sentence and type the English translation. There are 9 sentences: 3 narrative 📖, 3 persuasive 💬, 3 informative 📊. When you have done them all, hit Check Answers.'));

  const pb = el('div', { class: 'progress-bar' });
  const fill = el('div'); fill.style.width = '0%'; pb.appendChild(fill);
  head.appendChild(pb);
  app.appendChild(head);

  const list = el('div', { class: 'sentences' });
  quiz.items.forEach((it, i) => {
    const cardCls = 'qcard' + (it.checked ? (it.correct ? ' correct' : ' wrong') : '') + (it.checked && it.correct ? ' locked' : '');
    const card = el('div', { class: cardCls, id: 'q' + i });
    const tagCls = it.type === 'narrative' ? 'narr' : it.type === 'persuasive' ? 'pers' : 'info';
    const tagText = it.type === 'narrative' ? 'Narrative 📖' : it.type === 'persuasive' ? 'Persuasive 💬' : 'Informative 📊';
    card.appendChild(el('div', { class: 'qhead' },
      el('span', { class: 'qnum' }, `#${i + 1}`),
      el('span', { class: 'tag ' + tagCls }, tagText)
    ));
    card.appendChild(el('div', { class: 'zh' }, it.zh));
    const input = el('input', {
      type: 'text', placeholder: 'Type the English translation…',
      value: it.answer || '',
      autocomplete: 'off', autocorrect: 'on', spellcheck: 'true'
    });
    input.disabled = it.checked && it.correct;
    input.addEventListener('input', () => { it.answer = input.value; updateProgress(); });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const next = $('#q' + (i + 1) + ' input');
        if (next) next.focus();
      }
    });
    card.appendChild(input);

    const fb = el('div', { class: 'feedback' });
    if (it.checked) {
      if (it.correct) {
        fb.appendChild(el('div', {}, el('span', { class: 'ok' }, '✓ Great translation!')));
      } else {
        const showSample = quiz.revealedAll || quiz.attempts >= 2;
        const msg = showSample
          ? '✗ Not quite — use the sample below to fix yours, then re-check.'
          : '✗ Not quite right — have another go and re-check.';
        fb.appendChild(el('div', {}, el('span', { class: 'no' }, msg)));
        if (showSample) {
          fb.appendChild(el('div', { class: 'expect' }, 'Sample answer: ', el('b', {}, it.en)));
        }
      }
    }
    card.appendChild(fb);
    list.appendChild(card);
  });
  app.appendChild(list);

  // Actions
  const allChecked = quiz.items.every(x => x.checked);
  const allCorrect = quiz.items.every(x => x.correct);
  const wrongCount = quiz.items.filter(x => x.checked && !x.correct).length;

  const actions = el('div', { class: 'quiz-actions' });
  let infoText;
  if (!allChecked) infoText = `Fill all 9 then press Check Answers.`;
  else if (allCorrect) infoText = `🎉 Nice — all 9 close enough! Tap Next Topic.`;
  else if (quiz.attempts >= 2) infoText = `${wrongCount} to fix. Sample answers shown — match the meaning and re-check.`;
  else infoText = `${wrongCount} to fix. Tweak them and re-check (samples appear after the next try).`;
  actions.appendChild(el('div', { class: 'info' }, infoText));

  const btnRow = el('div', { class: 'row-wrap' });
  if (allCorrect && allChecked) {
    btnRow.appendChild(el('button', { class: 'btn warn', onclick: () => { quiz = null; render(); } }, 'Back to Topics'));
    btnRow.appendChild(el('button', { class: 'btn primary lg', onclick: nextTopic }, 'Next Topic →'));
  } else {
    if (quiz.attempts < 2) {
      btnRow.appendChild(el('button', {
        class: 'btn',
        onclick: () => {
          if (!quiz.items.every(x => (x.answer || '').trim().length > 0)) {
            toast('Fill in every sentence first', '✏️');
            return;
          }
          if (confirm('Reveal all sample answers now? You can still fix yours and re-check.')) {
            quiz.revealedAll = true;
            quiz.items.forEach(x => { if (!x.checked) { x.checked = true; x.correct = isCloseEnough(x.answer, x.en); } });
            renderQuiz();
          }
        }
      }, 'Reveal Answers'));
    }

    btnRow.appendChild(el('button', { class: 'btn primary lg', onclick: checkAnswers }, allChecked ? 'Re-check ✓' : 'Check Answers ✓'));
  }
  actions.appendChild(btnRow);
  app.appendChild(actions);

  updateProgress();
}

function updateProgress() {
  if (!quiz) return;
  const filled = quiz.items.filter(x => (x.answer || '').trim().length > 0).length;
  const fill = $('.progress-bar > div');
  if (fill) fill.style.width = (filled / 9 * 100) + '%';
}

function checkAnswers() {
  // Require all to be filled
  if (!quiz.items.every(x => (x.answer || '').trim().length > 0)) {
    toast('Fill in every sentence first', '✏️');
    return;
  }
  quiz.attempts++;
  let newlyCorrect = 0;
  quiz.items.forEach(it => {
    if (it.checked && it.correct) return; // locked correct stays
    const wasChecked = it.checked;
    it.checked = true;
    it.correct = isCloseEnough(it.answer, it.en);
    if (it.correct && !wasChecked && quiz.attempts === 1) {
      newlyCorrect++;
    }
  });

  if (quiz.attempts === 1) {
    quiz.correctOnFirstTry = quiz.items.filter(x => x.correct).length;
  }

  const allCorrect = quiz.items.every(x => x.correct);
  if (allCorrect) {
    finishUnit();
    return;
  }

  // partial — re-render and toast
  const right = quiz.items.filter(x => x.correct).length;
  toast(`${right}/9 close enough. Keep fixing!`, '💪');
  renderQuiz();
  // Scroll to first wrong
  const firstWrong = quiz.items.findIndex(x => !x.correct);
  if (firstWrong >= 0) {
    setTimeout(() => {
      const node = document.getElementById('q' + firstWrong);
      if (node) node.scrollIntoView({ behavior: 'smooth', block: 'center' });
      const inp = node && node.querySelector('input');
      if (inp) inp.focus();
      if (node) node.classList.add('shake');
      setTimeout(() => node && node.classList.remove('shake'), 300);
    }, 50);
  }
}

function finishUnit() {
  const u = quiz.unit;
  const lvl = quiz.level;
  const key = `${u.id}_L${lvl}`;
  const firstTime = !state.completed[key];

  // Points: base 10/sentence × level multiplier, bonus for perfect first try
  const mult = lvl === 1 ? 1 : lvl === 2 ? 1.5 : 2;
  let earned = Math.round(9 * 10 * mult);
  const perfect = quiz.attempts === 1 && quiz.items.every(x => x.correct);
  if (perfect) earned += Math.round(100 * mult);
  if (firstTime) earned += Math.round(50 * mult);

  state.points += earned;
  state.completed[key] = { firstTry: perfect, attempts: quiz.attempts, score: earned };
  state.streak = (state.lastSession === todayStr() || !state.lastSession) ? state.streak + 1 : 1;
  state.lastSession = todayStr();
  if (perfect) awardBadge('star');
  pushHistory({ unit: u.id, unitName: u.name, level: lvl, mode: 'translate', perfect, xp: earned });
  saveState();
  checkLevelBadges();

  confetti();
  // Modal
  const m = el('div');
  m.appendChild(el('div', { style: { fontSize: '52px' } }, perfect ? '🏆' : '🎉'));
  m.appendChild(el('h2', {}, perfect ? 'Perfect Round!' : 'Topic Passed!'));
  m.appendChild(el('p', {}, perfect ? `${state.name}, you got all 9 right on your first try. Amazing!` : `Great work, ${state.name}! You finished ${u.name} on Level ${lvl}.`));
  const row = el('div', { class: 'stat-row' });
  row.appendChild(stat('XP earned', '+' + earned));
  row.appendChild(stat('Attempts', quiz.attempts));
  row.appendChild(stat('Streak', state.streak + ' 🔥'));
  m.appendChild(row);

  const btns = el('div', { class: 'row-wrap', style: { justifyContent: 'center', marginTop: '16px' } });
  // Find next topic at this level not yet completed
  const idx = UNITS.findIndex(x => x.id === u.id);
  let nextUnit = null;
  for (let i = 1; i <= UNITS.length; i++) {
    const cand = UNITS[(idx + i) % UNITS.length];
    if (!state.completed[`${cand.id}_L${lvl}`]) { nextUnit = cand; break; }
  }
  if (nextUnit) {
    btns.appendChild(el('button', { class: 'btn primary lg', onclick: () => { closeModal(); startQuiz(nextUnit.id); } }, `Next: ${nextUnit.emoji} ${nextUnit.name} →`));
  } else {
    btns.appendChild(el('button', { class: 'btn primary lg', onclick: () => { closeModal(); render(); } }, 'Back to Topics'));
  }
  btns.appendChild(el('button', { class: 'btn ghost', onclick: () => { closeModal(); quiz = null; render(); } }, 'Home'));
  m.appendChild(btns);
  openModal(m);
}

function nextTopic() {
  // Triggered from the "all correct" state; same logic as finish modal but without modal
  const u = quiz.unit;
  const lvl = quiz.level;
  const idx = UNITS.findIndex(x => x.id === u.id);
  let nextUnit = null;
  for (let i = 1; i <= UNITS.length; i++) {
    const cand = UNITS[(idx + i) % UNITS.length];
    if (!state.completed[`${cand.id}_L${lvl}`]) { nextUnit = cand; break; }
  }
  if (nextUnit) startQuiz(nextUnit.id);
  else { quiz = null; render(); }
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}

/* --------------------- SCRAMBLE MODE --------------------- */
let scramble = null;

function tokenizeEnglish(sentence) {
  return sentence.trim().split(/\s+/);
}
function shuffleUntilDifferent(arr) {
  if (arr.length < 2) return arr.slice();
  let out;
  for (let i = 0; i < 20; i++) {
    out = shuffle(arr);
    let same = true;
    for (let j = 0; j < arr.length; j++) if (out[j] !== arr[j]) { same = false; break; }
    if (!same) return out;
  }
  return out;
}

function startScramble(unitId) {
  const u = UNITS.find(x => x.id === unitId);
  const lvl = state.selectedLevel;
  const data = u.levels[lvl];
  const items = [];
  ['narrative', 'persuasive', 'informative'].forEach(t => {
    data[t].forEach(s => {
      const expected = tokenizeEnglish(s.en);
      const order = shuffleUntilDifferent(expected.map((_, i) => i));
      items.push({
        type: t, zh: s.zh, en: s.en,
        expected,                             // ordered tokens
        bankOrder: order,                     // initial shuffled indices into expected
        slots: [],                            // array of indices into expected (placement order)
        bankRemaining: order.slice(),         // indices still in the bank
        status: 'pending',                    // 'pending' | 'correct'
        wrongChecks: 0
      });
    });
  });
  scramble = {
    unit: u, level: lvl, items, index: 0,
    totalWrongChecks: 0, doneCount: 0
  };
  renderScramble();
}

function renderScramble() {
  const app = $('#app');
  app.innerHTML = '';
  app.appendChild(topbar());

  const it = scramble.items[scramble.index];

  const head = el('div', { class: 'panel' });
  head.appendChild(el('div', { class: 'quiz-header' },
    el('button', {
      class: 'btn ghost',
      onclick: () => {
        if (confirm('Leave this Scramble round? Progress on this round will be lost.')) { scramble = null; render(); }
      }
    }, '← Topics'),
    el('div', { class: 'crumb' }, `Level ${scramble.level} • ${scramble.unit.name} • 🧩 Scramble`)
  ));
  head.appendChild(el('div', { class: 'quiz-title' },
    el('div', { class: 'e' }, scramble.unit.emoji),
    el('h2', {}, `${scramble.unit.name} — Build the sentence`)
  ));
  head.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '14px', marginTop: '6px' } },
    'Tap the English word tiles in order to rebuild the sentence. Tap a placed tile to send it back to the bank.'));

  // dots progress
  const dots = el('div', { class: 'dots', style: { marginTop: '12px' } });
  scramble.items.forEach((s, i) => {
    const cls = 'd' + (i === scramble.index ? ' current' : (s.status === 'correct' ? ' done' : (s.wrongChecks > 0 ? ' wrong' : '')));
    dots.appendChild(el('span', { class: cls }));
  });
  head.appendChild(dots);
  app.appendChild(head);

  // Stage
  const stage = el('div', { class: 'panel scramble-stage' });
  const tagCls = it.type === 'narrative' ? 'narr' : it.type === 'persuasive' ? 'pers' : 'info';
  const tagText = it.type === 'narrative' ? 'Narrative 📖' : it.type === 'persuasive' ? 'Persuasive 💬' : 'Informative 📊';
  stage.appendChild(el('div', { class: 'scramble-meta' },
    el('span', { class: 'qnum' }, `Sentence ${scramble.index + 1} of ${scramble.items.length}`),
    el('span', { class: 'tag ' + tagCls }, tagText)
  ));
  stage.appendChild(el('div', { class: 'zh' }, it.zh));

  // Slots
  const slotsEl = el('div', { class: 'slots' + (it.slots.length === 0 ? ' empty' : '') });
  it.slots.forEach((idx, slotPos) => {
    const tile = el('button', {
      class: 'tile in-slot',
      onclick: () => {
        if (it.status === 'correct') return;
        // remove from slot, return to bank
        it.slots.splice(slotPos, 1);
        it.bankRemaining.push(idx);
        clearFeedback();
        renderScramble();
      }
    }, it.expected[idx]);
    slotsEl.appendChild(tile);
  });
  stage.appendChild(slotsEl);

  // Bank
  const bankEl = el('div', { class: 'bank' });
  if (it.bankRemaining.length === 0 && it.status !== 'correct') {
    bankEl.appendChild(el('div', { style: { color: 'var(--muted)', fontSize: '13px' } }, 'Bank is empty — hit Check ✓'));
  }
  it.bankOrder.forEach(idx => {
    const stillInBank = it.bankRemaining.includes(idx);
    if (!stillInBank) return;
    const tile = el('button', {
      class: 'tile',
      onclick: () => {
        if (it.status === 'correct') return;
        it.slots.push(idx);
        it.bankRemaining = it.bankRemaining.filter(x => x !== idx);
        clearFeedback();
        renderScramble();
      }
    }, it.expected[idx]);
    bankEl.appendChild(tile);
  });
  stage.appendChild(bankEl);

  // Feedback area
  const fb = el('div', { class: 'scramble-feedback', id: 'scrFb' });
  stage.appendChild(fb);

  app.appendChild(stage);

  // Actions
  const actions = el('div', { class: 'scramble-actions' });
  const info = el('div', { class: 'info', style: { color: 'var(--muted)', fontSize: '13px' } },
    `${scramble.doneCount} / ${scramble.items.length} sentences built`);
  actions.appendChild(info);

  const btns = el('div', { class: 'row-wrap' });
  btns.appendChild(el('button', {
    class: 'btn',
    onclick: () => {
      it.bankRemaining = it.bankOrder.slice();
      it.slots = [];
      clearFeedback();
      renderScramble();
    }
  }, 'Reset'));
  btns.appendChild(el('button', { class: 'btn', onclick: skipScramble }, 'Skip ↷'));
  btns.appendChild(el('button', { class: 'btn primary lg', onclick: checkScramble }, 'Check ✓'));
  actions.appendChild(btns);
  app.appendChild(actions);
}

function clearFeedback() {
  const fb = document.getElementById('scrFb');
  if (fb) { fb.classList.remove('show'); fb.innerHTML = ''; }
  const slots = document.querySelector('.slots');
  if (slots) { slots.classList.remove('correct', 'wrong'); }
}

function checkScramble() {
  const it = scramble.items[scramble.index];
  if (it.slots.length !== it.expected.length) {
    toast('Place every word first', '✏️');
    return;
  }
  const built = it.slots.map(i => it.expected[i]);
  const ok = built.length === it.expected.length &&
             built.every((w, i) => w.toLowerCase() === it.expected[i].toLowerCase());

  const slotsEl = document.querySelector('.slots');
  const fb = document.getElementById('scrFb');

  if (ok) {
    it.status = 'correct';
    scramble.doneCount++;
    if (slotsEl) slotsEl.classList.add('correct');
    fb.innerHTML = '';
    fb.appendChild(el('span', { class: 'ok' }, '✓ Nailed it!'));
    fb.classList.add('show');
    // Advance after a moment
    setTimeout(() => {
      const nextIdx = scramble.items.findIndex((s, i) => i > scramble.index && s.status !== 'correct');
      const anyLeft = scramble.items.some(s => s.status !== 'correct');
      if (!anyLeft) { finishScrambleUnit(); return; }
      scramble.index = nextIdx >= 0 ? nextIdx
        : scramble.items.findIndex(s => s.status !== 'correct');
      renderScramble();
    }, 700);
  } else {
    it.wrongChecks++;
    scramble.totalWrongChecks++;
    if (slotsEl) {
      slotsEl.classList.add('wrong');
      slotsEl.classList.add('shake');
      setTimeout(() => slotsEl.classList.remove('shake'), 300);
    }
    fb.innerHTML = '';
    fb.appendChild(el('span', { class: 'no' }, '✗ Not quite — check the word order and try again.'));
    if (it.wrongChecks >= 2) {
      fb.appendChild(el('div', { class: 'expect' }, 'Sample order: ', el('b', {}, it.expected.join(' '))));
    }
    fb.classList.add('show');
  }
}

function skipScramble() {
  const it = scramble.items[scramble.index];
  if (it.status === 'correct') return;
  if (!confirm('Skip this sentence? You can come back to it before the round ends.')) return;
  // Mark wrong-checks so it's not perfect, but leave status pending for retry
  it.wrongChecks = Math.max(it.wrongChecks, 1);
  scramble.totalWrongChecks++;
  // Move to next pending
  const order = [];
  for (let i = scramble.index + 1; i < scramble.items.length; i++) order.push(i);
  for (let i = 0; i < scramble.index; i++) order.push(i);
  const next = order.find(i => scramble.items[i].status !== 'correct');
  if (next == null) { finishScrambleUnit(); return; }
  scramble.index = next;
  renderScramble();
}

function finishScrambleUnit() {
  const u = scramble.unit;
  const lvl = scramble.level;
  const key = `${u.id}_L${lvl}_SCR`;
  const firstTime = !state.completed[key];

  const mult = lvl === 1 ? 1 : lvl === 2 ? 1.5 : 2;
  let earned = Math.round(9 * 10 * mult);
  const perfect = scramble.totalWrongChecks === 0;
  if (perfect) earned += Math.round(100 * mult);
  if (firstTime) earned += Math.round(50 * mult);

  state.points += earned;
  state.completed[key] = { firstTry: perfect, attempts: 1 + scramble.totalWrongChecks, score: earned, mode: 'scramble' };
  state.streak = (state.lastSession === todayStr() || !state.lastSession) ? state.streak + 1 : 1;
  state.lastSession = todayStr();
  if (perfect) { awardBadge('star'); awardBadge('wizard'); }
  pushHistory({ unit: u.id, unitName: u.name, level: lvl, mode: 'scramble', perfect, xp: earned });
  saveState();
  checkLevelBadges();

  confetti();

  const m = el('div');
  m.appendChild(el('div', { style: { fontSize: '52px' } }, perfect ? '🪄' : '🎉'));
  m.appendChild(el('h2', {}, perfect ? 'Word Wizard Round!' : 'Round Built!'));
  m.appendChild(el('p', {}, perfect
    ? `${state.name}, you built all 9 sentences with zero mistakes. Word-order master!`
    : `Great work, ${state.name}! You finished ${u.name} on Level ${lvl}.`));
  const row = el('div', { class: 'stat-row' });
  row.appendChild(stat('XP earned', '+' + earned));
  row.appendChild(stat('Wrong checks', scramble.totalWrongChecks));
  row.appendChild(stat('Streak', state.streak + ' 🔥'));
  m.appendChild(row);

  const btns = el('div', { class: 'row-wrap', style: { justifyContent: 'center', marginTop: '16px' } });
  const idx = UNITS.findIndex(x => x.id === u.id);
  let nextUnit = null;
  for (let i = 1; i <= UNITS.length; i++) {
    const cand = UNITS[(idx + i) % UNITS.length];
    if (!state.completed[`${cand.id}_L${lvl}_SCR`]) { nextUnit = cand; break; }
  }
  if (nextUnit) {
    btns.appendChild(el('button', {
      class: 'btn primary lg',
      onclick: () => { closeModal(); startScramble(nextUnit.id); }
    }, `Next: ${nextUnit.emoji} ${nextUnit.name} →`));
  } else {
    btns.appendChild(el('button', { class: 'btn primary lg', onclick: () => { closeModal(); scramble = null; render(); } }, 'Back to Topics'));
  }
  btns.appendChild(el('button', { class: 'btn ghost', onclick: () => { closeModal(); scramble = null; render(); } }, 'Home'));
  m.appendChild(btns);
  openModal(m);
}

/* --------------------- STORY STUDIO MODE --------------------- */
let story = null;

const PAST_IRREGULARS = ['saw','went','ran','was','were','did','had','ate','made','gave','took','came','found','said','told','got','threw','heard','flew','drove','swam','rode','built','sang','grew','knew','wrote','spoke','bought','brought','caught','taught','thought','left','met','sat','stood','won','lost','hit','slept','woke','felt','began','spent','kept','held','rose','fell','broke','chose','drew','blew','shook','set','put','read','let','cut','shot','rang'];
const PERSUASIVE_MARKERS = ['i think','i believe','i feel','in my opinion','should','must','need to','have to','important','because','everyone','every person','all of us','agree','disagree','clearly','obviously','definitely'];
const INFO_VERBS = [/\bis\b/, /\bare\b/, /\bwas\b/, /\bwere\b/, /\bhas\b/, /\bhave\b/, /\bcan\b/, /\blives?\b/, /\beats?\b/, /\bmakes?\b/, /\bcontains?\b/, /\bincludes?\b/, /\buses?\b/, /\bweighs?\b/, /\bmeasures?\b/, /\bgrows?\b/];

function splitSentences(text) {
  return (text || '').split(/[.!?]+/).map(s => s.trim()).filter(Boolean);
}
function wordCount(text) {
  return ((text || '').match(/\b[\w']+\b/g) || []).length;
}
function gradeWriting(text, prompt, level, type) {
  const t = (text || '').trim();
  const lower = t.toLowerCase();
  const sentences = splitSentences(t);
  const words = wordCount(t);
  const target = storyTargetsFor(level);

  const criteria = [];

  criteria.push({
    label: `Wrote at least ${target.sentences} sentences`,
    pass: sentences.length >= target.sentences,
    detail: `You wrote ${sentences.length} sentence${sentences.length === 1 ? '' : 's'}.`
  });

  criteria.push({
    label: `At least ${target.words} words`,
    pass: words >= target.words,
    detail: words >= target.words ? `${words} words — nice length.` : `You wrote ${words} words — keep going!`
  });

  const capOk = sentences.length > 0 && sentences.every(s => /^[A-Z"\u201C]/.test(s));
  criteria.push({
    label: 'Every sentence starts with a capital letter',
    pass: capOk,
    detail: capOk ? 'Capitalisation looks good.' : 'Check the first letter of each new sentence.'
  });

  const endsOk = sentences.length > 0 && /[.!?]\s*$/.test(t) && (t.match(/[.!?]/g) || []).length >= sentences.length;
  criteria.push({
    label: 'Every sentence ends with . ! or ?',
    pass: endsOk,
    detail: endsOk ? 'Punctuation looks good.' : 'Add a full stop (or ! / ?) to the end of each sentence.'
  });

  const usedKw = prompt.keywords.filter(kw => {
    const safe = kw.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return new RegExp(`\\b${safe}\\b`, 'i').test(lower);
  });
  const minKw = Math.min(2, prompt.keywords.length);
  criteria.push({
    label: `Used at least ${minKw} keyword${minKw === 1 ? '' : 's'} from the prompt`,
    pass: usedKw.length >= minKw,
    detail: usedKw.length > 0
      ? `You used: ${usedKw.join(', ')}.`
      : `Try to include at least ${minKw} of: ${prompt.keywords.join(', ')}.`
  });

  if (type === 'narrative') {
    const ed = (lower.match(/\b\w+ed\b/g) || []).length;
    const irr = PAST_IRREGULARS.filter(w => new RegExp(`\\b${w}\\b`, 'i').test(lower)).length;
    const total = ed + irr;
    criteria.push({
      label: 'Used past-tense verbs (narrative style)',
      pass: total >= 2,
      detail: total > 0 ? `Found ${total} past-tense verb${total === 1 ? '' : 's'}.` : 'Use verbs like "walked", "saw", "ran", "found" to tell what happened.'
    });
  } else if (type === 'persuasive') {
    const hits = PERSUASIVE_MARKERS.filter(m => lower.includes(m)).length;
    criteria.push({
      label: 'Used opinion / persuasion words',
      pass: hits >= 2,
      detail: hits > 0 ? `Found ${hits} opinion phrase${hits === 1 ? '' : 's'}.` : 'Use words like "should", "must", "important", "because", "I think".'
    });
  } else {
    const hits = INFO_VERBS.filter(r => r.test(lower)).length;
    criteria.push({
      label: 'Used factual / present-tense verbs',
      pass: hits >= 2,
      detail: hits > 0 ? `Found ${hits} factual verb pattern${hits === 1 ? '' : 's'}.` : 'Use verbs like "is", "are", "has", "have", "lives", "eats", "makes".'
    });
  }

  const passed = criteria.filter(c => c.pass).length;
  const total = criteria.length;
  const pass = passed >= total - 1; // need 5/6
  return { criteria, passed, total, pass, usedKeywords: usedKw, sentences: sentences.length, words };
}

function startStory(unitId) {
  const u = UNITS.find(x => x.id === unitId);
  const lvl = state.selectedLevel;
  const prompts = STORY_PROMPTS[u.id];
  const items = ['narrative', 'persuasive', 'informative'].map(type => ({
    type, prompt: prompts[type], text: '', checked: false, result: null, passed: false, attempts: 0
  }));
  story = { unit: u, level: lvl, items, index: 0, firstTryAllPass: true };
  renderStory();
}

function renderStory() {
  const app = $('#app');
  app.innerHTML = '';
  app.appendChild(topbar());

  const it = story.items[story.index];
  const target = storyTargetsFor(story.level);

  const head = el('div', { class: 'panel' });
  head.appendChild(el('div', { class: 'quiz-header' },
    el('button', {
      class: 'btn ghost',
      onclick: () => {
        if (confirm('Leave Story Studio? Your draft on this prompt will be lost.')) { story = null; render(); }
      }
    }, '← Topics'),
    el('div', { class: 'crumb' }, `Level ${story.level} • ${story.unit.name} • ✍️ Story Studio`)
  ));
  head.appendChild(el('div', { class: 'quiz-title' },
    el('div', { class: 'e' }, story.unit.emoji),
    el('h2', {}, `${story.unit.name} — Free Write`)
  ));

  // dots progress
  const dots = el('div', { class: 'dots', style: { marginTop: '10px' } });
  story.items.forEach((s, i) => {
    const cls = 'd' + (i === story.index ? ' current' : (s.passed ? ' done' : (s.attempts > 0 ? ' wrong' : '')));
    dots.appendChild(el('span', { class: cls }));
  });
  head.appendChild(dots);
  app.appendChild(head);

  // Prompt card
  const stage = el('div', { class: 'panel writer' });
  const tagCls = it.type === 'narrative' ? 'narr' : it.type === 'persuasive' ? 'pers' : 'info';
  const tagText = it.type === 'narrative' ? 'Narrative 📖' : it.type === 'persuasive' ? 'Persuasive 💬' : 'Informative 📊';

  const pcard = el('div', { class: 'prompt-card' });
  pcard.appendChild(el('div', { class: 'qhead' },
    el('span', { class: 'qnum' }, `Prompt ${story.index + 1} of ${story.items.length}`),
    el('span', { class: 'tag ' + tagCls }, tagText)
  ));
  pcard.appendChild(el('div', { class: 'scen' }, it.prompt.scenario));
  const kwChips = el('div', { class: 'kw-chips' });
  const usedLower = (it.text || '').toLowerCase();
  it.prompt.keywords.forEach(kw => {
    const safe = kw.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const used = new RegExp(`\\b${safe}\\b`, 'i').test(usedLower);
    kwChips.appendChild(el('span', { class: 'kw' + (used ? ' used' : '') }, (used ? '✓ ' : '') + kw));
  });
  pcard.appendChild(kwChips);
  pcard.appendChild(el('div', { class: 'target' },
    `Aim for at least ${target.sentences} sentences (~${target.words} words). Pass ${5} of 6 rubric checks to clear this prompt.`));
  stage.appendChild(pcard);

  // Textarea
  const ta = el('textarea', {
    placeholder: 'Start writing your ' + tagText.split(' ')[0].toLowerCase() + ' here…',
    spellcheck: 'true', autocomplete: 'off', autocorrect: 'on'
  });
  ta.value = it.text || '';
  ta.addEventListener('input', () => {
    it.text = ta.value;
    updateCounters();
    updateKwChips();
  });
  stage.appendChild(ta);

  // Counters
  const counters = el('div', { class: 'counters', id: 'storyCounters' });
  stage.appendChild(counters);

  // Rubric area
  const rubric = el('div', { class: 'rubric', id: 'storyRubric' });
  if (it.checked && it.result) {
    populateRubric(rubric, it.result);
  }
  stage.appendChild(rubric);

  app.appendChild(stage);

  // Actions
  const actions = el('div', { class: 'scramble-actions' });
  const info = el('div', { class: 'info', style: { color: 'var(--muted)', fontSize: '13px' } },
    it.passed
      ? '✓ Prompt passed — tap Next Prompt.'
      : it.checked
      ? `Passed ${it.result.passed}/${it.result.total} rubric checks. Edit and re-check.`
      : 'Write your paragraph, then tap Check My Writing.');
  actions.appendChild(info);

  const btns = el('div', { class: 'row-wrap' });
  if (it.passed) {
    const allDone = story.items.every(x => x.passed);
    if (allDone) {
      btns.appendChild(el('button', { class: 'btn primary lg', onclick: finishStoryUnit }, 'Finish Round 🎉'));
    } else {
      btns.appendChild(el('button', { class: 'btn primary lg', onclick: nextStoryPrompt }, 'Next Prompt →'));
    }
  } else {
    btns.appendChild(el('button', {
      class: 'btn',
      onclick: () => {
        const next = story.items.findIndex((s, i) => i > story.index && !s.passed);
        if (next >= 0) { story.index = next; renderStory(); return; }
        const any = story.items.findIndex(s => !s.passed);
        if (any >= 0 && any !== story.index) { story.index = any; renderStory(); }
        else { toast('No other prompts to switch to', 'ℹ️'); }
      }
    }, 'Switch Prompt ↷'));
    btns.appendChild(el('button', { class: 'btn primary lg', onclick: checkStory }, 'Check My Writing ✓'));
  }
  actions.appendChild(btns);
  app.appendChild(actions);

  updateCounters();
}

function updateCounters() {
  const it = story.items[story.index];
  const target = storyTargetsFor(story.level);
  const sCount = splitSentences(it.text).length;
  const wCount = wordCount(it.text);
  const node = document.getElementById('storyCounters');
  if (!node) return;
  node.innerHTML = '';
  const sCls = sCount >= target.sentences ? 'ok' : 'lo';
  const wCls = wCount >= target.words ? 'ok' : 'lo';
  node.appendChild(el('span', {}, 'Sentences: ', el('b', { class: sCls }, `${sCount} / ${target.sentences}`)));
  node.appendChild(el('span', {}, 'Words: ', el('b', { class: wCls }, `${wCount} / ${target.words}`)));
}

function updateKwChips() {
  const it = story.items[story.index];
  const chipsParent = document.querySelector('.kw-chips');
  if (!chipsParent) return;
  chipsParent.innerHTML = '';
  const lower = (it.text || '').toLowerCase();
  it.prompt.keywords.forEach(kw => {
    const safe = kw.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const used = new RegExp(`\\b${safe}\\b`, 'i').test(lower);
    chipsParent.appendChild(el('span', { class: 'kw' + (used ? ' used' : '') }, (used ? '✓ ' : '') + kw));
  });
}

function populateRubric(node, result) {
  node.innerHTML = '';
  result.criteria.forEach(c => {
    const row = el('div', { class: 'crit ' + (c.pass ? 'pass' : 'fail') },
      el('div', { class: 'ic' }, c.pass ? '✅' : '⬜'),
      el('div', {},
        el('div', { class: 'lbl' }, c.label),
        el('div', { class: 'det' }, c.detail)
      )
    );
    node.appendChild(row);
  });
}

function checkStory() {
  const it = story.items[story.index];
  if (!(it.text || '').trim()) { toast('Write something first ✏️'); return; }
  it.attempts++;
  const result = gradeWriting(it.text, it.prompt, story.level, it.type);
  it.result = result;
  it.checked = true;
  if (result.pass) {
    if (it.attempts > 1) story.firstTryAllPass = false;
    it.passed = true;
    toast(`Prompt passed — ${result.passed}/${result.total} rubric checks ✓`, '✨');
  } else {
    story.firstTryAllPass = false;
    toast(`${result.passed}/${result.total} checks passed — keep editing`, '💪');
  }
  renderStory();
}

function nextStoryPrompt() {
  const next = story.items.findIndex((s, i) => i > story.index && !s.passed);
  if (next >= 0) { story.index = next; renderStory(); return; }
  const any = story.items.findIndex(s => !s.passed);
  if (any >= 0) { story.index = any; renderStory(); return; }
  finishStoryUnit();
}

function finishStoryUnit() {
  const u = story.unit;
  const lvl = story.level;
  const key = `${u.id}_L${lvl}_STORY`;
  const firstTime = !state.completed[key];

  const mult = lvl === 1 ? 1 : lvl === 2 ? 1.5 : 2;
  let earned = Math.round(50 * mult * story.items.length); // 50 per passed prompt
  if (story.firstTryAllPass) earned += Math.round(150 * mult);
  if (firstTime) earned += Math.round(50 * mult);

  state.points += earned;
  state.completed[key] = { firstTry: story.firstTryAllPass, attempts: story.items.reduce((a, x) => a + x.attempts, 0), score: earned, mode: 'story' };
  state.streak = (state.lastSession === todayStr() || !state.lastSession) ? state.streak + 1 : 1;
  state.lastSession = todayStr();
  if (story.firstTryAllPass) { awardBadge('star'); awardBadge('wordsmith'); }
  pushHistory({ unit: u.id, unitName: u.name, level: lvl, mode: 'story', perfect: story.firstTryAllPass, xp: earned });
  saveState();
  checkLevelBadges();

  confetti();

  const m = el('div');
  m.appendChild(el('div', { style: { fontSize: '52px' } }, story.firstTryAllPass ? '✨' : '🎉'));
  m.appendChild(el('h2', {}, story.firstTryAllPass ? 'Wordsmith Round!' : 'Round Complete!'));
  m.appendChild(el('p', {}, story.firstTryAllPass
    ? `${state.name}, you nailed all 3 prompts on the first check. Top-shelf writing!`
    : `Awesome effort, ${state.name}. You finished ${u.name} on Level ${lvl}.`));
  const row = el('div', { class: 'stat-row' });
  row.appendChild(stat('XP earned', '+' + earned));
  row.appendChild(stat('Total attempts', story.items.reduce((a, x) => a + x.attempts, 0)));
  row.appendChild(stat('Streak', state.streak + ' 🔥'));
  m.appendChild(row);

  const btns = el('div', { class: 'row-wrap', style: { justifyContent: 'center', marginTop: '16px' } });
  const idx = UNITS.findIndex(x => x.id === u.id);
  let nextUnit = null;
  for (let i = 1; i <= UNITS.length; i++) {
    const cand = UNITS[(idx + i) % UNITS.length];
    if (!state.completed[`${cand.id}_L${lvl}_STORY`]) { nextUnit = cand; break; }
  }
  if (nextUnit) {
    btns.appendChild(el('button', {
      class: 'btn primary lg',
      onclick: () => { closeModal(); startStory(nextUnit.id); }
    }, `Next: ${nextUnit.emoji} ${nextUnit.name} →`));
  } else {
    btns.appendChild(el('button', { class: 'btn primary lg', onclick: () => { closeModal(); story = null; render(); } }, 'Back to Topics'));
  }
  btns.appendChild(el('button', { class: 'btn ghost', onclick: () => { closeModal(); story = null; render(); } }, 'Home'));
  m.appendChild(btns);
  openModal(m);
}

/* --------------------- PROGRESS OVERVIEW --------------------- */
const MODE_META = {
  translate: { name: 'Translate',     icon: '📝', suffix: ''       },
  scramble:  { name: 'Scramble',      icon: '🧩', suffix: '_SCR'   },
  story:     { name: 'Story Studio',  icon: '✍️', suffix: '_STORY' }
};

function modeCountFor(modeId) {
  const suffix = MODE_META[modeId].suffix;
  return Object.keys(state.completed).filter(k => {
    if (suffix === '') return !k.endsWith('_SCR') && !k.endsWith('_STORY');
    return k.endsWith(suffix);
  }).length;
}
function perfectCountFor(modeId) {
  const suffix = MODE_META[modeId].suffix;
  return Object.keys(state.completed).filter(k => {
    const isMode = suffix === '' ? (!k.endsWith('_SCR') && !k.endsWith('_STORY')) : k.endsWith(suffix);
    return isMode && state.completed[k] && state.completed[k].firstTry;
  }).length;
}
function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const today = new Date();
  const sameDay = d.toDateString() === today.toDateString();
  if (sameDay) {
    const hh = d.getHours().toString().padStart(2, '0');
    const mm = d.getMinutes().toString().padStart(2, '0');
    return `Today ${hh}:${mm}`;
  }
  const opts = { day: 'numeric', month: 'short' };
  return d.toLocaleDateString(undefined, opts);
}

function buildProgressSummary() {
  const lines = [];
  lines.push(`EALD Coach — Progress Report`);
  lines.push(`Player: ${state.name}`);
  lines.push(`Generated: ${new Date().toLocaleString()}`);
  lines.push('');
  lines.push(`Total XP: ${state.points}`);
  lines.push(`Streak: ${state.streak}`);
  lines.push(`Badges: ${state.badges.length} / ${Object.keys(BADGES).length}`);
  if (state.badges.length) {
    lines.push('  ' + state.badges.map(id => `${BADGES[id].icon} ${BADGES[id].name}`).join(', '));
  }
  lines.push('');
  for (const modeId of ['translate', 'scramble', 'story']) {
    const meta = MODE_META[modeId];
    const done = modeCountFor(modeId);
    const perf = perfectCountFor(modeId);
    lines.push(`${meta.icon} ${meta.name}: ${done}/30 cleared (${perf} perfect)`);
    for (const u of UNITS) {
      const cells = [1, 2, 3].map(lvl => {
        const c = state.completed[`${u.id}_L${lvl}${meta.suffix}`];
        if (!c) return '·';
        return c.firstTry ? '★' : '✓';
      });
      lines.push(`   ${u.emoji} ${u.name.padEnd(14, ' ')}  L1:${cells[0]}  L2:${cells[1]}  L3:${cells[2]}`);
    }
    lines.push('');
  }
  const hist = (state.history || []).slice(0, 10);
  if (hist.length) {
    lines.push('Recent activity:');
    hist.forEach(h => {
      const meta = MODE_META[h.mode] || { name: h.mode };
      lines.push(`  - ${formatDate(h.ts)}  ${meta.name}  ${h.unitName || h.unit}  L${h.level}  +${h.xp || 0} XP${h.perfect ? '  ★' : ''}`);
    });
  }
  lines.push('');
  lines.push('Legend: ★ cleared first try (perfect) · ✓ cleared · · not yet');
  return lines.join('\n');
}

function copyProgressSummary() {
  const text = buildProgressSummary();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => toast('Summary copied to clipboard!', '📋'),
      () => fallbackCopy(text)
    );
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); toast('Summary copied!', '📋'); }
  catch (e) { toast('Copy not supported here — use Download', 'ℹ️'); }
  document.body.removeChild(ta);
}
function downloadProgressSummary() {
  const text = buildProgressSummary();
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const safeName = (state.name || 'player').replace(/[^a-z0-9_\-]+/gi, '_');
  a.download = `eald-progress-${safeName}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Downloaded progress summary', '⬇');
}

/* --------------------- PROFILE / SETTINGS --------------------- */
function openProfile() {
  const m = el('div');
  m.appendChild(el('div', { style: { fontSize: '40px' } }, '🏆'));
  m.appendChild(el('h2', {}, `${state.name}'s Trophy Cabinet`));
  m.appendChild(el('p', {}, `${state.points} XP · ${Object.keys(state.completed).length} units passed · streak ${state.streak} 🔥`));

  const all = Object.keys(BADGES);
  const row = el('div', { class: 'badges-row' });
  for (const id of all) {
    const has = state.badges.includes(id);
    const b = BADGES[id];
    const cls = has ? id : '';
    const node = el('div', {
      class: 'badge ' + cls, title: b.name + ' — ' + b.desc,
      style: { opacity: has ? 1 : 0.35, filter: has ? 'none' : 'grayscale(0.6)' }
    }, b.icon);
    row.appendChild(node);
  }
  m.appendChild(row);

  m.appendChild(el('div', { class: 'section-title', style: { marginTop: '14px' } }, 'Badges'));
  const list = el('div', { style: { textAlign: 'left' } });
  for (const id of all) {
    const has = state.badges.includes(id);
    const b = BADGES[id];
    const row2 = el('div', { style: { display: 'flex', gap: '10px', alignItems: 'center', padding: '6px 0', opacity: has ? 1 : 0.6 } });
    row2.appendChild(el('div', { style: { fontSize: '20px', width: '24px' } }, has ? '✅' : '🔒'));
    row2.appendChild(el('div', {},
      el('div', { style: { fontWeight: 700 } }, b.icon + ' ' + b.name),
      el('div', { style: { color: 'var(--muted)', fontSize: '12px' } }, b.desc)
    ));
    list.appendChild(row2);
  }
  m.appendChild(list);

  const btns = el('div', { class: 'row-wrap', style: { justifyContent: 'center', marginTop: '16px' } });
  btns.appendChild(el('button', { class: 'btn', onclick: () => closeModal() }, 'Close'));
  btns.appendChild(el('button', {
    class: 'btn danger',
    onclick: () => {
      if (confirm('Sign out and clear all progress on this device?')) {
        localStorage.removeItem(STORE_KEY);
        state = defaultState();
        closeModal();
        render();
      }
    }
  }, 'Sign out & reset'));
  m.appendChild(btns);
  openModal(m);
}

/* --------------------- BOOT --------------------- */
render();
</script>
